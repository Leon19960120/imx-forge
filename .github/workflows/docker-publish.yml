name: Docker Image Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - preview

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Docker publish policy
        id: policy
        shell: bash
        run: |
          set -euo pipefail

          should_publish="true"
          reason="manual dispatch or no opt-out marker"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_message="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)' || true)"
            if printf '%s\n' "${tag_message}" | grep -qiE '^Docker-Image:[[:space:]]*false[[:space:]]*$'; then
              should_publish="false"
              reason="tag ${GITHUB_REF_NAME} has Docker-Image: false"
            fi
          fi

          echo "should_publish=${should_publish}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Docker Publish Policy"
            echo ""
            echo "- Should publish: \`${should_publish}\`"
            echo "- Reason: ${reason}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set up Docker Buildx
        if: steps.policy.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.policy.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.policy.outputs.should_publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/awesome-embedded-learning-studio/imx-forge
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        if: steps.policy.outputs.should_publish == 'true'
        uses: docker/build-push-action@v5
        with:
          context: docker
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
