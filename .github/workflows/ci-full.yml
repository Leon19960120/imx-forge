name: Full Build

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, opened, synchronize]
  workflow_dispatch:
    inputs:
      stage:
        description: '构建阶段'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - '1'
          - '2'
          - '3'
          - '4'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: imx-forge:ci
  BUILD_OUTPUT: out/release-latest

jobs:
  # 检查是否应该运行
  check:
    name: Check Trigger
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      compile_3rd_party: ${{ steps.check.outputs.compile_3rd_party }}
    steps:
      - id: check
        run: |
          SHOULD_RUN="false"
          COMPILE_3RD_PARTY="false"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            SHOULD_RUN="true"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_RUN="true"
          elif [[ "${{ github.event.label.name }}" == "full-build" ]]; then
            SHOULD_RUN="true"
          elif [[ "${{ env.HAS_FULL_BUILD_LABEL }}" == "true" ]]; then
            SHOULD_RUN="true"
          fi
          if [[ "${{ env.HAS_COMPILE_3RD_PARTY_LABEL }}" == "true" ]]; then
            COMPILE_3RD_PARTY="true"
          fi
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "compile_3rd_party=$COMPILE_3RD_PARTY" >> $GITHUB_OUTPUT
        env:
          HAS_FULL_BUILD_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'full-build') }}
          HAS_COMPILE_3RD_PARTY_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'compile-support-3rd-party') }}

  # Stage 1: U-Boot
  stage1:
    name: Stage 1 - U-Boot
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 U-Boot 子模块
        run: git submodule update --init --depth=1 third_party/uboot-imx

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Cache ccache for U-Boot (Stage 1)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-full-uboot-${{ github.base_ref || github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-full-uboot-${{ github.base_ref || github.ref_name }}-
            ${{ runner.os }}-ccache-full-uboot-

      - name: 构建 U-Boot (Stage 1)
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              git config --global --add safe.directory "*"
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/release-all.sh --stage 1
              ccache -s
            '

      - name: 验证产物
        run: |
          [ -f ${{ env.BUILD_OUTPUT }}/uboot/u-boot-dtb.imx ] || exit 1
          ls -lh ${{ env.BUILD_OUTPUT }}/uboot/

  # Stage 2: 双内核并行构建
  stage2-imx:
    name: Stage 2 - Linux (NXP BSP)
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 linux-imx 子模块
        run: git submodule update --init --depth=1 third_party/linux-imx

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Cache ccache for Linux NXP BSP (Stage 2)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-full-linux-imx-${{ github.base_ref || github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-full-linux-imx-${{ github.base_ref || github.ref_name }}-
            ${{ runner.os }}-ccache-full-linux-imx-

      - name: 构建 Linux NXP BSP (Stage 2)
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              git config --global --add safe.directory "*"
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/release-all.sh --stage 2
              ccache -s
            '

      - name: 验证产物
        run: |
          [ -f ${{ env.BUILD_OUTPUT }}/linux/arch/arm/boot/zImage ] || exit 1
          [ -f ${{ env.BUILD_OUTPUT }}/linux/arch/arm/boot/dts/nxp/imx/imx6ull-aes.dtb ] || exit 1

  stage2-mainline:
    name: Stage 2 - Linux (Mainline)
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 linux-mainline 子模块
        run: git submodule update --init --depth=1 third_party/linux_mainline

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Cache ccache for Linux Mainline
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-full-linux-mainline-${{ github.base_ref || github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-full-linux-mainline-${{ github.base_ref || github.ref_name }}-
            ${{ runner.os }}-ccache-full-linux-mainline-

      - name: 构建 Linux Mainline
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              git config --global --add safe.directory "*"
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/release-all.sh --mainline --stage 2
              ccache -s
            '

      - name: 验证产物
        run: |
          [ -f out/release-latest/linux/arch/arm/boot/zImage ] || exit 1
          [ -f out/release-latest/linux/arch/arm/boot/dts/nxp/imx/imx6ull-aes.dtb ] || exit 1
          grep -q "Kernel Track: mainline" out/release-latest/linux/build_info.txt

  # Stage 3+4: BusyBox + RootFS (合并)
  stage3-4:
    name: Stage 3+4 - BusyBox & RootFS
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'
    # 动态超时：有 compile-support-3rd-party 标签时 600 分钟，否则 30 分钟
    timeout-minutes: ${{ needs.check.outputs.compile_3rd_party == 'true' && 600 || 30 }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 busybox 子模块
        run: git submodule update --init --depth=1 third_party/busybox

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Cache ccache for BusyBox
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-full-busybox-${{ github.base_ref || github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-full-busybox-${{ github.base_ref || github.ref_name }}-
            ${{ runner.os }}-ccache-full-busybox-

      - name: 构建 BusyBox (Stage 3) + 完成 RootFS (Stage 4)
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            -e SKIP_THIRD_PARTY_INSTALL=${{ needs.check.outputs.compile_3rd_party != 'true' }} \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              git config --global --add safe.directory "*"
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/release-all.sh --stage 3
              ./scripts/release-all.sh --stage 4
              ./scripts/varified_rootfs_ok.sh --rootfs-dir=out/release-latest/rootfs
              ccache -s
            '

      - name: 验证 BusyBox 产物
        run: |
          [ -f ${{ env.BUILD_OUTPUT }}/busybox/busybox ] || exit 1
          [ -f ${{ env.BUILD_OUTPUT }}/rootfs/bin/busybox ] || exit 1

  # 最终验证和产物上传
  final:
    name: Final Validation
    runs-on: ubuntu-latest
    needs: [check, stage1, stage2-imx, stage2-mainline, stage3-4]
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: 创建构建摘要
        run: |
          echo "## IMX-Forge 构建报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **U-Boot**: 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "- **Linux NXP BSP**: 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "- **Linux Mainline**: 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "- **BusyBox**: 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "- **RootFS**: 验证通过" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 第三方组件" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.check.outputs.compile_3rd_party }}" == "true" ]]; then
            echo "- **Qt/字体/固件**: 已编译" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Qt/字体/固件**: 已跳过 (添加 \`compile-support-3rd-party\` 标签启用)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 上传 Release 产物
        uses: actions/upload-artifact@v4
        with:
          name: release-images
          path: out/release-latest/images/
          retention-days: 30
