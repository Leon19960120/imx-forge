name: PR Quick Checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: imx-forge:ci

jobs:
  # Job 1: 文档验证
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: 检查脚本 README 覆盖率
        run: ./develop/scripts_readme_check.sh

      - name: 验证 MkDocs 配置
        run: ./scripts/document/mkdocs_dev.sh build

  # Job 2: 脚本语法检查
  shellcheck:
    name: Shell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: 运行 ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          # 检查所有 shell 脚本
          find ./scripts -type f \( -name "*.sh" -o -name "*.bash" \) -exec shellcheck -x {} + 2>&1 || true

  # Job 3: 配置验证
  configs:
    name: Configuration Files
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: 检查 defconfig 存在性
        run: |
          [ -f "driver/device_tree/alpha-board/linux/imx_aes_defconfig.template" ] || exit 1
          echo "defconfig 模板存在"

      - name: 检查设备树文件存在性
        run: |
          dts_count=$(find driver/device_tree -name "*.dts" 2>/dev/null | wc -l)
          echo "找到 $dts_count 个设备树文件"
          if [[ "$dts_count" -gt 0 ]]; then
            echo "设备树文件将在驱动构建时验证"
          fi

  # Job 4: Docker 环境验证
  docker:
    name: Docker Environment
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: |
          cd docker
          docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 验证工具链
        run: |
          docker run --rm --user root ${{ env.DOCKER_IMAGE }} \
            arm-none-linux-gnueabihf-gcc --version

  # 汇总状态供分支保护使用
  status:
    name: Overall Status
    runs-on: ubuntu-latest
    needs: [docs, shellcheck, configs, docker]
    if: always()
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Report Status to GitHub
        uses: actions/github-script@v7
        with:
          script: |
            const needs = ${{ toJson(needs) }};
            const jobs = ['Documentation', 'Shell Scripts', 'Configuration Files', 'Docker Environment'];

            // 检查是否有任何检查失败
            let hasFailures = false;

            for (const job of jobs) {
              if (needs[job]?.result === 'failure') {
                hasFailures = true;
                break;
              }
            }

            // 确定最终状态
            const state = hasFailures ? 'failure' : 'success';
            const description = hasFailures ? 'Some quick checks failed' : 'All quick checks passed';

            // 向 GitHub Status API 报告状态
            try {
              const status = await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: state,
                context: 'PR Quick Checks',
                description: description,
                target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              console.log('Status created:', status.data);
            } catch (error) {
              console.error('Failed to create status:', error);
              throw error;
            }
