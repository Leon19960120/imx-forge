name: Component Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: imx-forge:ci

jobs:
  # 路径检测
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      uboot: ${{ steps.changes.outputs.uboot }}
      linux-imx: ${{ steps.changes.outputs.linux-imx }}
      linux-mainline: ${{ steps.changes.outputs.linux-mainline }}
      busybox: ${{ steps.changes.outputs.busybox }}
      driver: ${{ steps.changes.outputs.driver }}
      scripts: ${{ steps.changes.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          base: main
          filters: |
            uboot:
              - 'patches/uboot/**'
              - 'patches/uboot-imx/**'
              - 'scripts/build_helper/build-uboot.sh'
              - 'scripts/release_builder/build_release_uboot.sh'
            linux-imx:
              - 'patches/linux-imx/**'
              - 'scripts/build_helper/build-linux.sh'
            linux-mainline:
              - 'patches/linux_mainline/**'
              - 'scripts/build_helper/build-mainline-linux.sh'
            busybox:
              - 'patches/busybox/**'
              - 'scripts/build_helper/build-busybox.sh'
              - 'scripts/release_builder/build_release_busybox.sh'
            driver:
              - 'driver/**'
            scripts:
              - 'scripts/**'
              - '.github/workflows/**'

  # U-Boot 构建
  uboot:
    name: U-Boot
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.uboot == 'true' || needs.detect.outputs.scripts == 'true'
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 U-Boot 子模块
        run: git submodule update --init --depth=1 third_party/uboot-imx

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 应用 U-Boot 补丁
        run: cd third_party/uboot-imx && ../../scripts/apply_patches.sh uboot-imx

      - name: Cache ccache for U-Boot
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-uboot-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-uboot-

      - name: 构建 U-Boot
        run: |
          docker run --rm \
            --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/build_helper/build-uboot.sh
              ccache -s
            '

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: uboot
          path: out/uboot/u-boot-dtb.imx
          retention-days: 7

  # Linux NXP BSP 构建
  linux-imx:
    name: Linux (NXP BSP)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.linux-imx == 'true' || needs.detect.outputs.scripts == 'true'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 linux-imx 子模块
        run: git submodule update --init --depth=1 third_party/linux-imx

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 应用 Linux NXP BSP 补丁
        run: cd third_party/linux-imx && ../../scripts/apply_patches.sh linux-imx

      - name: Cache ccache for Linux NXP BSP
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-linux-imx-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-imx-

      - name: 构建 Linux NXP BSP
        run: |
          docker run --rm \
            --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/build_helper/build-linux.sh
              ccache -s
            '

      - name: 验证产物
        run: |
          [ -f out/linux/arch/arm/boot/zImage ] || exit 1
          file out/linux/arch/arm/boot/zImage | grep -q ARM

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-imx
          path: |
            out/linux/arch/arm/boot/zImage
            out/linux/arch/arm/boot/dts/nxp/imx/imx6ull-aes.dtb
          retention-days: 7

  # Linux Mainline 构建（与 NXP 并行）
  linux-mainline:
    name: Linux (Mainline)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.linux-mainline == 'true' || needs.detect.outputs.scripts == 'true'
    timeout-minutes: 22
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 linux-mainline 子模块
        run: git submodule update --init --depth=1 third_party/linux_mainline

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 应用 Linux Mainline 补丁
        run: cd third_party/linux_mainline && ../../scripts/apply_patches.sh linux_mainline

      - name: Cache ccache for Linux Mainline
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-linux-mainline-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-mainline-

      - name: 构建 Linux Mainline
        run: |
          docker run --rm \
            --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/build_helper/build-mainline-linux.sh
              ccache -s
            '

      - name: 验证产物
        run: |
          [ -f out/mainline/linux/arch/arm/boot/zImage ] || exit 1
          file out/mainline/linux/arch/arm/boot/zImage | grep -q ARM

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-mainline
          path: out/mainline/linux/arch/arm/boot/zImage
          retention-days: 7

  # BusyBox 构建
  busybox:
    name: BusyBox
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.busybox == 'true' || needs.detect.outputs.scripts == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 busybox 子模块
        run: git submodule update --init --depth=1 third_party/busybox

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Cache ccache for BusyBox
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-busybox-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-busybox-

      - name: 构建 BusyBox
        run: |
          docker run --rm \
            --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/build_helper/build-busybox.sh
              ccache -s
            '

      - name: 验证产物
        run: |
          [ -f out/busybox/busybox ] || exit 1
          file out/busybox/busybox | grep -q "ARM"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: busybox
          path: out/busybox/busybox
          retention-days: 7

  # 驱动构建
  drivers:
    name: Drivers
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.driver == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 初始化 linux-mainline 子模块
        run: git submodule update --init --depth=1 third_party/linux_mainline

      - name: 应用 Linux Mainline 补丁
        run: cd third_party/linux_mainline && ../../scripts/apply_patches.sh linux_mainline

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Cache ccache for Drivers
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-linux-mainline-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-mainline-

      - name: 验证工具链
        run: |
          docker run --rm \
            --user root \
            -v $PWD:/workspace \
            -w /workspace \
            ${{ env.DOCKER_IMAGE }} \
            bash -c "
              echo '=== 环境信息 ==='
              echo 'PATH: $PATH'
              echo 'ARCH: $ARCH'
              echo 'CROSS_COMPILE: $CROSS_COMPILE'
              echo ''
              echo '=== 工具链检查 ==='
              which make && make --version | head -1
              which arm-none-linux-gnueabihf-gcc && arm-none-linux-gnueabihf-gcc --version | head -1
              echo ''
              echo '=== 内核源码检查 ==='
              ls -la third_party/linux_mainline/Makefile
              ls -la third_party/linux_mainline/arch/arm/configs/imx_aes_mainline_defconfig
            "

      - name: 准备内核环境
        run: |
          docker run --rm \
            --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/build_helper/build-mainline-linux.sh --fast-build
              ccache -s
            '

      - name: 构建所有驱动
        run: |
          docker run --rm \
            --user root \
            -v $PWD:/workspace \
            -w /workspace \
            -e CCACHE_DIR=/workspace/.ccache \
            -e CCACHE_BASEDIR=/workspace \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_COMPILERCHECK=content \
            ${{ env.DOCKER_IMAGE }} \
            bash -c '
              set -e
              ccache -M 2G && ccache -z
              mkdir -p /workspace/ccache-bin
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-gcc
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-g++
              ln -sf /usr/bin/ccache /workspace/ccache-bin/arm-none-linux-gnueabihf-ar
              export PATH="/workspace/ccache-bin:${PATH}"
              ./scripts/driver_helper/build_driver.sh --all
              ccache -s
            '

      - name: 验证驱动产物
        run: |
          find driver -name "*.ko" -exec file {} \; 2>/dev/null | head -5 || echo "No kernel modules found, continuing..."

  # 汇总状态供分支保护使用
  status:
    name: Overall Status
    runs-on: ubuntu-latest
    needs: [detect, uboot, linux-imx, linux-mainline, busybox, drivers]
    if: always()
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Report Status to GitHub
        uses: actions/github-script@v7
        with:
          script: |
            const needs = ${{ toJson(needs) }};
            const jobs = ['U-Boot', 'Linux (NXP BSP)', 'Linux (Mainline)', 'BusyBox', 'Drivers'];

            // 检查是否有任何构建失败
            let hasFailures = false;
            let hasSuccess = false;

            for (const job of jobs) {
              const result = needs[job]?.result;
              if (result === 'failure') {
                hasFailures = true;
              } else if (result === 'success') {
                hasSuccess = true;
              }
            }

            // 确定最终状态
            let state = 'success';
            let description = 'All checks passed';

            if (hasFailures) {
              state = 'failure';
              description = 'Some component builds failed';
            } else if (!hasSuccess) {
              // 没有任何构建运行（所有都被跳过）
              state = 'success';
              description = 'No component changes detected';
            } else {
              state = 'success';
              description = 'Component builds passed';
            }

            // 向 GitHub Status API 报告状态
            try {
              const status = await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: state,
                context: 'Component Build',
                description: description,
                target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              console.log('Status created:', status.data);
            } catch (error) {
              console.error('Failed to create status:', error);
              throw error;
            }
