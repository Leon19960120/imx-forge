# ==============================================================================
# fonts.conf - 字体下载和安装配置
# ==============================================================================
# 此文件定义嵌入式 Qt 桌面系统所需的字体下载源和安装配置
#
# 功能：
#   - DejaVu Fonts: 拉丁字符 + 等宽字体
#   - Noto Sans CJK: 中日韩字符
#   - Noto Color Emoji: Emoji 支持
#
# 使用方法：
#   source scripts/third_party_install/config/qt/fonts.conf
# ==============================================================================

# ------------------------------------------------------------------------------
# 依赖检查
# ------------------------------------------------------------------------------
# 此文件依赖 qt.conf 中的 WORK_DIR 变量
: "${WORK_DIR:?Error: WORK_DIR is not set. Please source qt.conf first: source config/qt/qt.conf}"

# ------------------------------------------------------------------------------
# 字体启用开关
# ------------------------------------------------------------------------------
FONTS_ENABLED="${FONTS_ENABLED:-true}"

# 字体安装目标目录（在 ROOTFS 中）
FONTS_TARGET_DIR="${FONTS_TARGET_DIR:-/usr/share/fonts}"

# 字体临时下载目录（在 WORK_DIR 中）
FONTS_DL_DIR="${FONTS_DL_DIR:-${WORK_DIR}/fonts-downloads}"

# 字体缓存目录（下载后解压的中间文件）
FONTS_CACHE_DIR="${FONTS_CACHE_DIR:-${WORK_DIR}/fonts-cache}"

# ------------------------------------------------------------------------------
# DejaVu Fonts 2.37 (拉丁字符 + 等宽字体)
# ------------------------------------------------------------------------------
# 用途：英文 UI 字体、等宽终端字体
# 许可：Bitstream Vera Font License
# 大小：~5.2 MB
DEJAVU_VERSION="${DEJAVU_VERSION:-2.37}"
# 使用 SourceForge 镜像（更稳定）
DEJAVU_URL="${DEJAVU_URL:-https://sourceforge.net/projects/dejavu/files/dejavu/${DEJAVU_VERSION}/dejavu-fonts-ttf-${DEJAVU_VERSION}.tar.bz2/download}"
DEJAVU_FILE="${DEJAVU_FILE:-dejavu-fonts-ttf-${DEJAVU_VERSION}.tar.bz2}"

# DejaVu 关键文件列表（用于检测是否已安装）
DEJAVU_KEY_FILES=(
    "DejaVuSans.ttf"
    "DejaVuSans-Bold.ttf"
    "DejaVuSans-Oblique.ttf"
    "DejaVuSans-BoldOblique.ttf"
    "DejaVuSansMono.ttf"
    "DejaVuSansMono-Bold.ttf"
)

# ------------------------------------------------------------------------------
# Noto Sans CJK 2.004 (中日韩字符)
# ------------------------------------------------------------------------------
# 用途：中日韩字符显示
# 许可：SIL Open Font License 1.1
# 大小：~18 MB (OTC 版本包含所有字重)
NOTO_CJK_VERSION="${NOTO_CJK_VERSION:-2.004}"
# 使用 Super OTC（包含所有 CJK 语言和字重）
NOTO_CJK_URL="${NOTO_CJK_URL:-https://github.com/notofonts/noto-cjk/releases/download/Sans${NOTO_CJK_VERSION}/03_NotoSansCJK-OTC.zip}"
NOTO_CJK_FILE="${NOTO_CJK_FILE:-03_NotoSansCJK-OTC.zip}"

# Noto CJK 关键文件列表（用于检测是否已安装）
# Super OTC 文件名
NOTO_CJK_KEY_FILES=(
    "NotoSansCJK-OTC.ttc"
)
# 备用：语言特定 OTF 文件
NOTO_CJK_OTF_KEY_FILES=(
    "NotoSansCJKsc-Regular.otf"
    "NotoSansCJKsc-Bold.otf"
)

# ------------------------------------------------------------------------------
# Noto Color Emoji (Emoji 支持)
# ------------------------------------------------------------------------------
# 用途：Emoji 字符显示
# 许可：SIL Open Font License 1.1
# 大小：~9 MB
NOTO_EMOJI_VERSION="${NOTO_EMOJI_VERSION:-v2.042}"
NOTO_EMOJI_URL="${NOTO_EMOJI_URL:-https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf}"
NOTO_EMOJI_FILE="${NOTO_EMOJI_FILE:-NotoColorEmoji.ttf}"

# Noto Emoji 关键文件（用于检测是否已安装）
NOTO_EMOJI_KEY_FILES=(
    "NotoColorEmoji.ttf"
)

# ------------------------------------------------------------------------------
# 字体目录结构配置
# ------------------------------------------------------------------------------
# 在 ROOTFS 中的目录结构
declare -A FONTS_DIR_MAP
FONTS_DIR_MAP[dejavu]="${FONTS_TARGET_DIR}/dejavu"
FONTS_DIR_MAP[noto]="${FONTS_TARGET_DIR}/noto"
FONTS_DIR_MAP[emoji]="${FONTS_TARGET_DIR}/emoji"

# ------------------------------------------------------------------------------
# Qt 环境变量
# ------------------------------------------------------------------------------
# Qt 字体目录环境变量（可添加到 /etc/environment 或启动脚本）
QT_FONT_ENV_VAR="QT_QPA_FONTDIR=${FONTS_TARGET_DIR}"

# UTF-8 语言环境（确保中文正确显示）
QT_LOCALE_ENV_VARS="
export LANG=C.UTF-8
export LC_ALL=C.UTF-8
"
