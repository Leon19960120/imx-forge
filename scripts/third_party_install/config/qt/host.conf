# ==============================================================================
# host.conf - Host Qt 编译配置
# ==============================================================================
# 此文件定义 Host Qt（主机版本）的安装路径和编译参数
# 使用 Qt 官方推荐的 ./configure 方式编译

# ------------------------------------------------------------------------------
# 依赖检查
# ------------------------------------------------------------------------------
# 此文件依赖 qt.conf 中的 WORK_DIR 变量
# 如果单独 source 此文件而没有先 source qt.conf，将会报错
: "${WORK_DIR:?Error: WORK_DIR is not set. Please source qt.conf first: source config/qt.conf}"

# ------------------------------------------------------------------------------
# 安装路径
# ------------------------------------------------------------------------------
# Host Qt 的安装目录
HOST_INSTALL_PREFIX="${PROJECT_ROOT}/host/qt6-host"

# ------------------------------------------------------------------------------
# 构建类型配置
# ------------------------------------------------------------------------------
# 是否构建 Debug 版本
# false = release 构建（默认，优化体积和速度）
# true  = debug 构建（包含调试符号，便于调试）
HOST_BUILD_DEBUG=false

# ------------------------------------------------------------------------------
# Configure 额外参数
# ------------------------------------------------------------------------------
# 这些参数会原样追加到 ./configure 命令末尾
#
# 注意：
#   1. 使用 - 开关的参数（如 -release）在脚本中自动处理
#   2. 这里主要配置 -D 开头的 CMake 变量和特殊选项
#   3. 详见: https://doc.qt.io/qt-6/configure-options.html
#
HOST_CONFIGURE_EXTRA="\
  -ltcg \
  -DFEATURE_sql=OFF \
  -DFEATURE_openssl=ON \
  -DFEATURE_ssl=ON \
"

# 额外的 CMake 参数（通过 -- 传递给 CMake）
HOST_CMAKE_EXTRA="\
  -DFEATURE_optimize_full=ON \
"

# 常用参数说明:
#
# 构建类型:
#   -release          发行版构建（不含调试符号）
#   -debug            调试版构建
#   -debug-and-release 同时构建 debug 和 release（仅 Windows）
#   -optimize-size    优化体积而非速度
#   -optimize-speed   优化速度而非体积
#   -force-debug-info release 构建包含调试信息
#
# 功能开关:
#   -DFEATURE_xxx=ON/OFF   启用/禁用特定功能
#
# 常用功能示例:
#   -DFEATURE_sql=ON        启用 SQL 支持
#   -DFEATURE_network=ON    启用网络支持
#   -DFEATURE_printsupport=ON 启用打印支持
